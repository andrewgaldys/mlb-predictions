<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MLB 2026 Picks Journal | Upcoming</title>
  <meta name="description" content="Upcoming MLB games with journal style picks and short reasoning." />
  <style>
    :root{
      --bg0:#ffffff;
      --bg1:#f3f4f6;
      --card:rgba(255,255,255,.62);
      --stroke:rgba(0,0,0,.08);
      --text:#0b0b0c;
      --muted:rgba(0,0,0,.62);
      --shadow: 0 18px 45px rgba(0,0,0,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(0,0,0,.05), transparent 60%),
        radial-gradient(900px 500px at 85% 20%, rgba(0,0,0,.04), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 40px}
    header{display:flex;gap:14px;align-items:center;justify-content:space-between;padding:14px 14px 18px}
    .brand{display:flex;gap:12px;align-items:center}
    .mark{
      width:38px;height:38px;border-radius:12px;
      background:linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.03));
      border:1px solid var(--stroke);
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }
    h1{font-size:18px;margin:0;letter-spacing:.2px}
    .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
    nav{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 12px;border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-decoration:none;color:var(--text);
      box-shadow: 0 10px 24px rgba(0,0,0,.05);
      font-size:13px;
    }
    .pill.active{background:rgba(0,0,0,.07)}
    .pill small{color:var(--muted);font-size:12px}

    .topbar{
      display:flex;gap:10px;align-items:center;justify-content:space-between;
      padding:0 14px 18px;flex-wrap:wrap;
    }
    .search{
      flex:1;display:flex;gap:10px;align-items:center;max-width:560px;
      padding:12px 12px;border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 34px rgba(0,0,0,.06);
    }
    .search input{width:100%;border:0;outline:0;background:transparent;font-size:13.5px;color:var(--text)}
    .hint{font-size:12.5px;color:var(--muted);white-space:nowrap}

    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:12px;
      padding:0 14px;
    }
    .card{
      grid-column: span 6;
      border-radius:var(--radius);
      border:1px solid var(--stroke);
      background:var(--card);
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
    }
    @media (max-width: 860px){ .card{grid-column: span 12;} }

    .cardHead{
      padding:14px 14px 10px;
      display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
      border-bottom:1px solid rgba(0,0,0,.06);
      background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.28));
    }
    .meta{display:flex;flex-direction:column;gap:4px}
    .meta .date{font-size:12.5px;color:var(--muted)}
    .meta .match{font-size:14.5px;font-weight:650;letter-spacing:.2px}
    .badge{
      padding:8px 10px;border-radius:999px;
      border:1px solid rgba(0,0,0,.10);
      background:rgba(255,255,255,.50);
      font-size:12.5px;
      white-space:nowrap;
    }

    .cardBody{padding:12px 14px 14px}
    .teams{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .team{display:flex;align-items:center;gap:10px;min-width:0}
    .logo{
      width:34px;height:34px;border-radius:12px;
      border:1px solid rgba(0,0,0,.10);
      background:rgba(255,255,255,.65);
      display:grid;place-items:center;
      overflow:hidden;
    }
    .logo img{width:26px;height:26px;display:block}
    .abbr{font-weight:700;letter-spacing:.6px;font-size:14px}
    .vs{
      font-size:12.5px;color:var(--muted);
      padding:6px 10px;border-radius:999px;
      border:1px solid rgba(0,0,0,.08);
      background:rgba(255,255,255,.45);
    }
    .why{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.08);
      background:rgba(255,255,255,.50);
    }
    .whyTitle{
      font-size:12px;color:var(--muted);
      margin:0 0 6px;
      letter-spacing:.25px;text-transform:uppercase;
    }
    ul{margin:0;padding-left:16px;color:rgba(0,0,0,.75);font-size:13px;line-height:1.45}
    .muted{color:var(--muted)}
    footer{padding:22px 14px 0;color:var(--muted);font-size:12.5px}
    .note{
      border:1px solid rgba(0,0,0,.08);
      background:rgba(255,255,255,.55);
      border-radius:14px;
      padding:12px 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0,0,0,.05);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>MLB 2026 Picks Journal</h1>
          <div class="sub">Every game in order, with your pick and why</div>
        </div>
      </div>
      <nav>
        <a class="pill active" href="./index.html">Upcoming <small>2026</small></a>
        <a class="pill" href="./results.html">Results <small>Journal</small></a>
      </nav>
    </header>

    <div class="topbar">
      <div class="search" role="search">
        <span class="muted" aria-hidden="true">Search</span>
        <input id="q" type="search" placeholder="Try: NYY, LAD, 04/02, night..." autocomplete="off" />
      </div>
      <div class="hint" id="count"></div>
    </div>

    <main class="grid" id="list"></main>

    <footer>
      <div class="note">
        <div><strong>Journal rule:</strong> MLB provides the schedule, you provide the picks in picks.json. This page merges them automatically.</div>
        <div class="muted">If a logo fails to load, we show a clean abbreviation fallback.</div>
      </div>
    </footer>
  </div>

  <script>
    // Team abbreviations mapped to MLB team IDs for logo URLs.
    // Logo pattern uses MLB static assets by teamId.  [oai_citation:3‡Reddit](https://www.reddit.com/r/mlbdata/comments/1b1eit0/team_logos/?utm_source=chatgpt.com)
    const TEAM = {
      ARI:{id:109}, ATL:{id:144}, BAL:{id:110}, BOS:{id:111}, CHC:{id:112},
      CWS:{id:145}, CIN:{id:113}, CLE:{id:114}, COL:{id:115}, DET:{id:116},
      HOU:{id:117}, KCR:{id:118}, LAA:{id:108}, LAD:{id:119}, MIA:{id:146},
      MIL:{id:158}, MIN:{id:142}, NYM:{id:121}, NYY:{id:147}, OAK:{id:133},
      PHI:{id:143}, PIT:{id:134}, SDP:{id:135}, SEA:{id:136}, SFG:{id:137},
      STL:{id:138}, TBR:{id:139}, TEX:{id:140}, TOR:{id:141}, WSN:{id:120}
    };

    function logoUrl(abbr){
      const t = TEAM[abbr];
      if(!t) return null;
      return `https://www.mlbstatic.com/team-logos/team-cap-on-light/${t.id}.svg`;
    }

    function logoFallbackHTML(abbr){
      return `
        <div style="
          width:26px;height:26px;border-radius:10px;
          display:grid;place-items:center;
          font-weight:800;font-size:10px;letter-spacing:.6px;
          color:rgba(0,0,0,.72);
          background:rgba(0,0,0,.04);
          border:1px solid rgba(0,0,0,.10);
        ">${abbr}</div>
      `;
    }

    // Window you asked for
    const START = new Date("2026-02-28T00:00:00Z");
    const END   = new Date("2026-12-31T23:59:59Z");

    const TZ = "America/New_York";

    function fmtDateTimeET(iso){
      const d = new Date(iso);
      const date = new Intl.DateTimeFormat(undefined, { timeZone: TZ, weekday:"short", month:"short", day:"numeric", year:"numeric" }).format(d);
      const time = new Intl.DateTimeFormat(undefined, { timeZone: TZ, hour:"numeric", minute:"2-digit" }).format(d);
      return { date, time: `${time} ET` };
    }

    // MLB schedule endpoint is available via statsapi.mlb.com.  [oai_citation:4‡xStats](https://www.xstats.org/articles/2021/8/27/scraping-the-mlb-api-using-node?utm_source=chatgpt.com)
    async function fetchSchedule2026(){
      const url = new URL("https://statsapi.mlb.com/api/v1/schedule");
      url.searchParams.set("sportId", "1");
      url.searchParams.set("startDate", "2026-02-28");
      url.searchParams.set("endDate", "2026-12-31");
      // hydrate helps include richer objects like teams (common usage pattern).  [oai_citation:5‡Reddit](https://www.reddit.com/r/mlbdata/comments/1e2b1ic/anyone_know_a_free_api_for_just_mlb_schedule_home/?utm_source=chatgpt.com)
      url.searchParams.set("hydrate", "team");

      const res = await fetch(url.toString());
      if(!res.ok) throw new Error(`Schedule fetch failed (${res.status})`);
      return res.json();
    }

    async function fetchPicks(){
      const res = await fetch("./picks.json", { cache: "no-store" });
      if(!res.ok) return {};
      return res.json();
    }

    function flattenSchedule(json){
      const out = [];
      const dates = Array.isArray(json?.dates) ? json.dates : [];
      for(const day of dates){
        const games = Array.isArray(day?.games) ? day.games : [];
        for(const g of games){
          const gameDate = g?.gameDate;
          if(!gameDate) continue;
          const dt = new Date(gameDate);
          if(dt < START || dt > END) continue;

          const awayTeam = g?.teams?.away?.team || {};
          const homeTeam = g?.teams?.home?.team || {};
          const awayAbbr = awayTeam?.abbreviation || "";
          const homeAbbr = homeTeam?.abbreviation || "";

          out.push({
            gamePk: g?.gamePk,
            gameDate,
            away: awayAbbr,
            home: homeAbbr
          });
        }
      }
      out.sort((a,b) => new Date(a.gameDate) - new Date(b.gameDate));
      return out;
    }

    const listEl = document.getElementById("list");
    const qEl = document.getElementById("q");
    const countEl = document.getElementById("count");

    function render(items, picks){
      listEl.innerHTML = "";

      items.forEach(g => {
        const pk = String(g.gamePk || "");
        const entry = picks?.[pk] || {};
        const pick = entry?.pick || "TBD";
        const why = Array.isArray(entry?.why) ? entry.why : [];

        const awayLogo = logoUrl(g.away);
        const homeLogo = logoUrl(g.home);

        const dt = fmtDateTimeET(g.gameDate);

        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="cardHead">
            <div class="meta">
              <div class="date">${dt.date}  •  ${dt.time}</div>
              <div class="match">${g.away} @ ${g.home}</div>
            </div>
            <div class="badge">Pick: <strong>${pick}</strong></div>
          </div>

          <div class="cardBody">
            <div class="teams">
              <div class="team">
                <div class="logo" data-abbr="${g.away}">
                  ${awayLogo ? `<img alt="${g.away} logo" src="${awayLogo}" />` : logoFallbackHTML(g.away)}
                </div>
                <div class="abbr">${g.away}</div>
              </div>

              <div class="vs">VS</div>

              <div class="team" style="justify-content:flex-end">
                <div class="abbr">${g.home}</div>
                <div class="logo" data-abbr="${g.home}">
                  ${homeLogo ? `<img alt="${g.home} logo" src="${homeLogo}" />` : logoFallbackHTML(g.home)}
                </div>
              </div>
            </div>

            <div class="why">
              <p class="whyTitle">Why</p>
              ${
                why.length
                  ? `<ul>${why.map(x => `<li>${x}</li>`).join("")}</ul>`
                  : `<div class="muted" style="font-size:13px;line-height:1.45">No notes yet. Add this gamePk to picks.json: <strong>${pk}</strong></div>`
              }
            </div>
          </div>
        `;
        listEl.appendChild(card);
      });

      listEl.querySelectorAll(".logo img").forEach(img => {
        img.addEventListener("error", (e) => {
          const wrap = e.target.closest(".logo");
          const abbr = wrap.getAttribute("data-abbr") || "";
          wrap.innerHTML = logoFallbackHTML(abbr);
        });
      });

      countEl.textContent = `${items.length} game${items.length === 1 ? "" : "s"}`;
    }

    function applySearch(items, picks){
      const q = (qEl.value || "").trim().toUpperCase();
      if(!q) return { items, picks };

      const filtered = items.filter(g => {
        const pk = String(g.gamePk || "");
        const entry = picks?.[pk] || {};
        const hay = `${pk} ${g.away} ${g.home} ${g.gameDate} ${(entry.pick||"")} ${(entry.why||[]).join(" ")}`.toUpperCase();
        return hay.includes(q);
      });
      return { items: filtered, picks };
    }

    async function boot(){
      try{
        const [scheduleJson, picks] = await Promise.all([fetchSchedule2026(), fetchPicks()]);
        const games = flattenSchedule(scheduleJson);

        function rerender(){
          const { items } = applySearch(games, picks);
          render(items, picks);
        }

        qEl.addEventListener("input", rerender);
        rerender();
      }catch(err){
        listEl.innerHTML = `
          <div class="card" style="grid-column: span 12; padding:14px">
            <div style="font-weight:700;margin-bottom:6px">Could not load schedule</div>
            <div class="muted" style="font-size:13px;line-height:1.45">
              ${String(err?.message || err)}
              <br><br>
              If this is happening on GitHub Pages, confirm your site is served over https and that statsapi.mlb.com is reachable from your browser.
            </div>
          </div>
        `;
      }
    }

    boot();
  </script>
</body>
</html>
